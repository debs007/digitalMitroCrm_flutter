name: digital_mitro
description: "Digital Mitro CRM — mobile app (Flutter)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.41.6"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  flutter_pdfview: ^1.3.2
  video_player: ^2.9.2
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# Run after placing your icon at assets/images/app_icon.png:
#   flutter pub get
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  # Android 13+ supports adaptive themed icons — optional but recommended.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
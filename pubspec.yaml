name: digital_mitro
description: "Digital Mitro CRM — mobile app (Flutter)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.41.6"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Uncomment and add files once real brand assets are dropped into assets/images
  # assets:
  #   - assets/images/
